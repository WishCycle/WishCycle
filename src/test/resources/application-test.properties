# Database forbindelse (H2 i hukommelsen)
spring.datasource.url=jdbc:h2:mem:wish_cycle;MODE=MySQL
#spring.datasource.driver-class-name=
spring.datasource.username=sa
spring.datasource.password=

# SQL Indstillinger (Vigtigt for at 'schema.sql' virker)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:h2init.sql
