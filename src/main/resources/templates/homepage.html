<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WishCycle | Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="../static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="navbar">
    <div class="logo">
        <a th:href="@{homepage}" href="homepage.html">
            <img th:src="@{/images/WishCycle-Logo.png}" src="../static/images/WischCycle-Logo.png" alt="WishCycle Logo">
        </a>
        <span class="slogan">Wish for a better future</span>
    </div>

    <nav class="auth-buttons">
        <a th:href="@{/login-page}" href="login-page.html" class="btn-login">Login</a>
        <a th:href="@{/signup-page}" href="signup-page.html" class="btn-signup">Sign Up</a>
        <div class="user-circle">User</div>
    </nav>
</header>

<main>
    <section class="boards-container">
        <div class="board-box">
            <h2>Mine WishCycles</h2>
        </div>
        <div class="board-box">
            <h2>Venner/Familie WishCycles</h2>
        </div>
    </section>

    <section class="inspo-container">
        <div class="inspo-card">Inspo Placeholder</div>
        <div class="inspo-card">Inspo Placeholder</div>
        <div class="inspo-card">Inspo Placeholder</div>
        <div class="inspo-card">Inspo Placeholder</div>
    </section>
</main>

<footer class="main-footer">
    <div class="footer-content-minimal">
        <a th:href="@{homepage}" href="homepage.html">
            <img th:src="@{/images/WishCycle-Logo.png}" src="../static/images/WischCycle-Logo.png" alt="WishCycle Logo"
                 class="footer-logo">
        </a>
        <span class="footer-tag">@WishCycle 2026</span>
        <a th:href="@{about-us}" href="about-us.html" class="footer-link">About Us</a>
        <a href="#" class="footer-link">Terms</a>
        <a href="#" class="footer-link">Privacy</a>
        <a href="#" class="footer-link">Contact</a>
    </div>
</footer>

</body>
</html>
