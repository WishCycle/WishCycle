<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WishCycle | Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}" href="../static/css/style.css">
</head>
<body class="signup-body">

<div class="signup-card">
    <div class="signup-logo-container">
        <a th:href="@{/wishcycle/homepage}" href="homepage.html">
            <img th:src="@{/images/WishCycle-Logo.png}" src="../static/images/WishCycle-Logo.png" alt="WishCycle Logo">
        </a>
    </div>

    <h2>Welcome to WishCycle</h2>
    <p>Enter details to create your profile</p>

    <div th:if="${errorMessage}" style="color: #ff4d4d; background: #ffe6e6; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center;">
        <p th:text="${errorMessage}"></p>
    </div>

    <form action='#' th:action="@{/wishcycle/signup/save}" th:object="${member}" method="post">
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" required th:field="*{name}">
        </div>

        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" required th:field="*{email}">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required th:field="*{password}">
        </div>

        <button type="submit" class="btn-primary">Sign Up</button>
    </form>

    <div class="signup-footer">
        Already have an account? <a th:href="@{/wishcycle/login/profile/{memberId}}" href="login-page.html">Login in here</a>
    </div>
</div>

</body>
</html>
