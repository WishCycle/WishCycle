<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WishCycle | Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="../static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<header class="navbar">
    <div class="header-left">
        <div class="logo">
            <a th:href="@{/wishcycle/homepage}" href="homepage.html">
                <img th:src="@{/images/WishCycle-Logo.png}" src="../static/images/WishCycle-Logo.png"
                     alt="WishCycle Logo">
            </a>
            <span class="slogan">Wish for a better future</span>
        </div>
    </div>

    <nav class="main-nav">
        <a th:href="@{/wishcycle/homepage}" href="homepage.html" class="nav-link">Home</a>
        <a th:href="@{/wishcycle/wishlists/{memberId}}" href="personal-wishcycles.html" class="nav-link active">My WishCycles</a>
        <a th:href="@{/wishcycle//social-wishlists/{memberId}}" href="social-wishcycles.html" class="nav-link">Social WishCycles</a>
        <a th:href="@{/wishcycle/about-us}" href="about-us.html" class="nav-link">About WishCycle</a>
    </nav>

    <nav class="auth-buttons">
        <a th:href="@{/wishcycle/login/profile/{memberId}}" href="user-profile.html" class="btn-profile">Profile</a>
    </nav>
</header>

<main class="content-wrapper">

    <div class="action-bar">
        <a th:href="@{/add-new-wishlist}" href="add-new-wishlist.html" class="btn-action">
            <span class="icon">+</span> New Wishlist
        </a>
        <a th:href="@{/add-new-item}" href="add-new-item.html" class="btn-action">
            <span class="icon">+</span> Add Wish
        </a>
    </div>

    <section class="wish-category">
        <h3 class="category-title">Home / Decor</h3>
        <div class="inspo-container">
            <div class="inspo-card">Ceramic Vase</div>
            <div class="inspo-card">Wool Throw</div>
            <div class="inspo-card">Oak Side Table</div>
        </div>
    </section>

    <section class="wish-category">
        <h3 class="category-title">Clothing / Selfcare</h3>
        <div class="inspo-container">
            <div class="inspo-card">Linen Shirt</div>
            <div class="inspo-card">Leather Boots</div>
            <div class="inspo-card">Silk Scarf</div>
        </div>
    </section>

</main>

<footer class="main-footer">
    <div class="footer-content-minimal">
        <a th:href="@{/wishcycle/homepage}" href="homepage.html">
            <img th:src="@{/images/WishCycle-Logo.png}" src="../static/images/WishCycle-Logo.png" alt="WishCycle Logo"
                 class="footer-logo">
        </a>
        <span class="footer-tag">@WishCycle 2026</span>
        <a th:href="@{about-us}" href="about-us.html" class="footer-link">About Us</a>
        <a href="#" class="footer-link">Terms</a>
        <a href="#" class="footer-link">Privacy</a>
        <a href="#" class="footer-link">Contact</a>
    </div>
</footer>

</body>
</html>
