<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist View - WishCycle</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="../static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-cream">

<header class="navbar">
    <div class="header-left">
        <div class="logo">
            <a th:href="@{/wishcycle/homepage}" href="homepage.html">
                <img th:src="@{/images/WishCycle-Logo.png}" src="../static/images/WishCycle-Logo.png"
                     alt="WishCycle Logo">
            </a>
            <span class="slogan">Wish for a better future</span>
        </div>
    </div>

    <nav class="main-nav">
        <a th:href="@{/wishcycle/homepage}" href="homepage.html" class="nav-link">Home</a>

        <a th:href="@{/wishcycle/wishlists/{id}(id=${session.member.memberId})}" href="personal-wishcycles.html" class="nav-link">My WishCycles</a>

        <a th:href="@{/wishcycle/social-wishlists/{id}(id=${session.member.memberId})}" href="social-wishcycles.html" class="nav-link">Social WishCycles</a>

        <a th:href="@{/wishcycle/about-us}" href="about-us.html" class="nav-link">About WishCycle</a>
    </nav>

    <nav class="auth-buttons">
        <a th:href="@{/wishcycle/login/profile/{id}(id=${session.member.memberId})}" href="user-profile.html" class="btn-profile">Profile</a>
    </nav>
</header>

<main class="content-wrapper">

    <div class="action-bar">
        <a th:href="@{/wishcycle/wishlists/{id}(id=${session.member.memberId})}" class="btn-action">
            ← Back to WishCycles
        </a>

        <a th:href="@{/wishcycle/wishlist/add/item}" href="add-new-item.html" class="btn-action">
            <span class="icon">+</span> Add Wish
        </a>

        <form th:action="@{/wishcycle/wishlist/delete/list}" method="post">
            <input type="hidden" name="wishListId" th:value="${wishlist.wishListId}" />
            <button type="submit" class="btn-action">Delete List</button>
        </form>
    </div>

    <div>

        <section class="wish-category" th:if="${items != null && !items.isEmpty()}">

            <h3 class="category-title" th:text="${wishlist.getWishListName()}">Category Name</h3>

            <div class="inspo-container">
                <div th:each="item : ${items}" th:remove="tag">

                    <a th:if="${item.getUrl() != null && !item.getUrl().isEmpty()}"
                       th:href="${item.getUrl()}"
                       target="_blank"
                       class="inspo-card">
                        <span th:text="${item.getItemName()}">Item Name</span>
                    </a>

                    <div th:unless="${item.getUrl() != null && !item.getUrl().isEmpty()}"
                         class="inspo-card">
                        <span th:text="${item.getItemName()}">Item Name</span>
                    </div>
                </div>
            </div>
        </section>
    </div>

</main>

<footer class="main-footer">
    <div class="footer-content-minimal">
        <a th:href="@{/wishcycle/homepage}" href="homepage.html">
            <img th:src="@{/images/WishCycle-Logo.png}" src="../static/images/WishCycle-Logo.png" alt="WishCycle Logo"
                 class="footer-logo">
        </a>
        <span class="footer-tag">@WishCycle 2026</span>
        <a th:href="@{/wishcycle/about-us}" href="about-us.html" class="footer-link">About WishCycle</a>
        <a th:href="@{/wishcycle/login-page}" href="login-page.html" class="footer-link">Log Out</a>
    </div>
</footer>

</body>
</html>
