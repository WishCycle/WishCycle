<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WishCycle | Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="../static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-cream">

<header class="navbar">
    <div class="header-left">
        <div class="logo">
            <a th:href="@{/wishcycle/homepage}" href="homepage.html">
                <img th:src="@{/images/WishCycle-Logo.png}" src="../static/images/WishCycle-Logo.png" alt="WishCycle Logo">
            </a>
            <span class="slogan">Wish for a better future</span>
        </div>
    </div>

    <nav class="main-nav">
        <a th:href="@{/wishcycle/homepage}" class="nav-link">Home</a>

        <a th:href="@{/wishcycle/wishlists/{id}(id=${session.member.memberId})}"
           class="nav-link active">My WishCycles</a>

        <a th:href="@{/wishcycle/social-wishlists/{id}(id=${session.member.memberId})}"
           class="nav-link">Social WishCycles</a>
        <a th:href="@{/wishcycle/about-us}" href="about-us.html" class="nav-link">About WishCycle</a>
    </nav>

    <nav class="auth-buttons">
        <a th:href="@{/wishcycle/login/profile/{id}(id=${session.member.memberId})}"
           class="btn-profile">Profile</a>
    </nav>
</header>

<main class="content-wrapper profile-centered">

    <section class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar">
                <span th:text="${#strings.substring(member.name,0,1)}">U</span>
            </div>
            <h2 th:text="${member.name}">Username</h2>
            <p class="member-since">Member of WishCycle</p>
        </div>

        <div class="profile-details">
            <div class="detail-item">
                <label>Email Address</label>
                <p th:text="${member.   email}">user@example.com</p>
            </div>

            <div class="detail-item">
                <label>Password</label>
                <p>••••••••••••</p>
                <small class="hint">Passwords are encrypted for your safety</small>
            </div>
        </div>

        <div class="profile-actions">
            <button class="btn-secondary">Edit Profile</button>
        </div>

        <form th:action="@{/wishcycle/logout}" method="post">
            <button type="submit" class="btn-logout" style="background:none; border:none; color:blue; cursor:pointer; text-decoration:underline;">
                Logout
            </button>
        </form>
    </section>

</main>

<footer class="main-footer">
    <div class="footer-content-minimal">
        <a th:href="@{/wishcycle/homepage}" href="homepage.html">
            <img th:src="@{/images/WishCycle-Logo.png}" src="../static/images/WishCycle-Logo.png" alt="WishCycle Logo"
                 class="footer-logo">
        </a>
        <span class="footer-tag">@WishCycle 2026</span>
        <a th:href="@{about-us}" href="about-us.html" class="footer-link">About Us</a>
        <a href="#" class="footer-link">Terms</a>
        <a href="#" class="footer-link">Privacy</a>
        <a href="#" class="footer-link">Contact</a>
    </div>
</footer>

</body>
</html>
