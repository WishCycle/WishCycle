<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WishCycle | Add a Wish</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="../static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-cream">

<header class="navbar">
    <div class="header-left">
        <div class="logo">
            <a th:href="@{/homepage}" href="homepage.html">
                <img th:src="@{/images/WishCycle-Logo.png}" src="../static/images/WishCycle-Logo.png"
                     alt="WishCycle Logo">
            </a>
            <span class="slogan">Wish for a better future</span>
        </div>
    </div>

    <nav class="main-nav">
        <a th:href="@{/wishcycle/homepage}" class="nav-link">Home</a>

        <a th:href="@{/wishcycle/wishlists/{id}(id=${session.member.memberId})}"
           class="nav-link active">My WishCycles</a>

        <a th:href="@{/wishcycle/social-wishlists/{id}(id=${session.member.memberId})}"
           class="nav-link">Social WishCycles</a>
        <a th:href="@{/wishcycle/about-us}" href="about-us.html" class="nav-link">About WishCycle</a>
    </nav>

    <nav class="auth-buttons">
        <a th:href="@{/wishcycle/login/profile/{id}(id=${session.member.memberId})}"
           class="btn-profile">Profile</a>
    </nav>
</header>

</header>

<main class="content-wrapper profile-centered">
    <section class="profile-card">
        <h2 class="category-title">Add a New Wish</h2>

        <form th:action="@{/wishcycle/wishlist/create/item}" th:object="${item}" method="post" class="form-layout">

            <div class="input-group">
                <label for="wishlistId">Select Wishlist</label>
                <select id="wishlistId" name="wishListId" class="custom-select" required>
                    <option value="" disabled selected>Which list does this belong to?</option>
                    <option value="1">Home / Decor</option>
                    <option value="2">Clothing / Selfcare</option>
                </select>
            </div>

            <div class="input-group">
                <label for="itemName">What are you wishing for?</label>
                <input type="text" th:field="*{itemName}" id="itemName" placeholder="e.g., Vintage Coffee Table" required>
            </div>

            <div class="input-group">
                <label for="itemUrl">Link to Product (Optional)</label>
                <input type="url" th:field="*{url}" id="itemUrl" placeholder="https://recycled-shop.com/item">
                <small class="hint">Linking to pre-loved or reusable items is encouraged!</small>
            </div>

            <div class="input-group">
                <label for="itemPrice">Estimated Price</label>
                <input type="number" step="0.01" th:field="*{price}" id="itemPrice" placeholder="0.00" required>
            </div>

            <div class="profile-actions">
                <button type="submit" class="btn-primary">Add to List</button>
                <a th:href="@{/personal-wishcycles}" class="btn-logout">Cancel</a>
            </div>
        </form>
    </section>
</main>

<footer class="main-footer">
    <div class="footer-content-minimal">
        <span class="footer-tag">© 2026 WishCycle</span>
    </div>
</footer>

</body>
</html>
